apiVersion: core.eda.nokia.com/v1
kind: Manifest
metadata:
  name: imagemanager
spec:
  group: imagemanager.eda.edacommunity.com
  version: v1alpha1
  title: EDA Image Manager
  description: |
    A lab-friendly web UI to upload network OS images into EDA. You upload the
    raw .bin (optionally with an .md5) or the vendor .zip; each upload is stored
    in-cluster and an EDA Artifact CR is created automatically, so the built-in
    artifact server (eda-asvr) downloads the file, validates it against the md5,
    and re-hosts it for node bootstrap and image upgrades. EDA's artifact server
    uses a pull model that integrates with an organization's central image store
    or data lake; this app is a self-contained alternative for labs and PoCs
    where standing up that external store is unnecessary friction.
  author: EDACommunity
  image: ghcr.io/kkayhan/edaapp_imagemanager/imagemanager-app:v26.4.2-5
  supportedCoreVersions:
    - "v5.0.0-0"
  appInfo:
    categories:
      - integrations
    documentation: imagemanager/docs
    ociSpecVersion: v1.0.0
    settings: imagemanager/settings/openapi/eda_oas_imagemanager.eda.edacommunity.com_appsettings.json
  components:
    - crd:
        api:
          expose: readWrite
        path: imagemanager/crds/imagemanager.eda.edacommunity.com_imagemanagerconfigs.yaml
        schema: imagemanager/openapiv3/eda_oas_imagemanager.eda.edacommunity.com_imagemanagerconfigs.json
        namespaced: false
        ui:
          category: Image Manager
          name: Config
        names:
          kind: ImageManagerConfig
          listKind: ImageManagerConfigList
          plural: imagemanagerconfigs
          singular: imagemanagerconfig
    - cr:
        path: imagemanager/manifests/app_deployment.yaml
    - cr:
        path: imagemanager/manifests/pvc.yaml
    - cr:
        path: imagemanager/manifests/service.yaml
    - cr:
        path: imagemanager/manifests/httpproxy.yaml
    - cr:
        path: imagemanager/manifests/rbac.yaml
  dependencies:
    - file:
        path: utils
    - file:
        path: common
    - file:
        path: imagemanager/api/v1alpha1/pysrc
    - file:
        path: imagemanager/api
